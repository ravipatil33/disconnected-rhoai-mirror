# Phase 3 — ModelCar OCI artifacts (mirror to disk)
#
# Large images — mirror separately from Phase 1/2. Use dedicated EBS space.
#
# Registries (IDMS needed in secure zone after push):
#   - registry.redhat.io/rhai
#   - registry.redhat.io/rhelai1
#
# Logins before mirror:
#   podman login registry.redhat.io
#
# Mirror to disk (tmux on AWS):
#   oc mirror -c imageset-p3-modelcars.yaml file:///data/p3-mirror --v2 2>&1 | tee /data/p3-mirror.log
#
# Push later (secure zone):
#   oc mirror -c imageset-p3-modelcars.yaml \
#     --from file:///data/p3-mirror docker://<YOUR_QUAY_HOST>:443 --v2
#
# Sizing (rough — verify after mirror):
#   granite-4-0-h-small-fp8-dynamic     ~ tens of GB
#   nemotron-3-nano-30b-fp8           ~ tens of GB
#   gpt-oss-20b                         ~ 20–40 GB
#   gpt-oss-120b                        ~ 100–250+ GB — confirm tag exists before mirror
#   Total Phase 3 (all five): plan 200–350+ GB on top of Phase 1/2

kind: ImageSetConfiguration
apiVersion: mirror.openshift.io/v2alpha1
archiveSize: 20

mirror:
  additionalImages:
    - name: registry.redhat.io/rhai/modelcar-granite-4-0-h-small-fp8-dynamic:3.0
    - name: registry.redhat.io/rhai/modelcar-nvidia-nemotron-3-nano-30b-a3b-fp8:3.0
    - name: registry.redhat.io/rhelai1/modelcar-gpt-oss-20b:1.5

# if you have hardware and GPU for big models, you can get those, we are using 20B model
    #- name: registry.redhat.io/rhelai1/modelcar-gpt-oss-120b:1.5
