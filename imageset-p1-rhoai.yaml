kind: ImageSetConfiguration
apiVersion: mirror.openshift.io/v2alpha1
#apiVersion: mirror.openshift.io/v1alpha2
archiveSize: 20
#storageConfig:
#   registry:
#    imageURL: <YOUR_QUAY_HOST>:443/mirror/oc-mirror-metadata
#    skipTLS: false   # true only if Quay uses self-signed TLS

mirror:
  operators:

  # ---------------------------------------------------------------------------
  # Red Hat operator catalog
  # ---------------------------------------------------------------------------
  - catalog: registry.redhat.io/redhat/redhat-operator-index:v4.19
    packages:

    # --- Core OpenShift AI ---
    - name: rhods-operator
      channels:
      - name: stable-3.x          # default channel (required by oc-mirror v2)
      - name: stable-3.4
        minVersion: 3.4.0
        maxVersion: 3.4.0

    # --- Platform / KServe / GPU serving dependencies ---
    - name: openshift-cert-manager-operator
      channels:
      - name: stable-v1
    - name: nfd
      channels:
      - name: stable
    - name: servicemeshoperator3
      channels:
      - name: stable

    # --- Auth / gateway / llm-d ---
    - name: authorino-operator
      channels:
      - name: stable
    - name: rhcl-operator
      channels:
      - name: stable

    # --- Distributed workloads / scheduling ---
    - name: leader-worker-set
      channels:
      - name: stable-v1.0

    - name: kueue-operator
      channels:
      - name: stable-v1.3
    - name: job-set
      channels:
      - name: stable-v1.0

    # --- Autoscaling (KEDA / Custom Metrics Autoscaler) ---
    - name: openshift-custom-metrics-autoscaler-operator
      channels:
      - name: stable

    # --- Observability stack ---
    - name: opentelemetry-product
      channels:
      - name: stable
    - name: tempo-product
      channels:
      - name: stable
    - name: cluster-observability-operator
      channels:
      - name: stable

  # ---------------------------------------------------------------------------
  # Certified catalog — NVIDIA GPU Operator
  # ---------------------------------------------------------------------------
  - catalog: registry.redhat.io/redhat/certified-operator-index:v4.19
    packages:
    - name: gpu-operator-certified
      channels:
      - name: v26.3              # default channel (required by oc-mirror v2)
      - name: stable
        minVersion: 26.3.2
        maxVersion: 26.3.2

  # ---------------------------------------------------------------------------
  # Community catalog — Grafana Operator (RHOAI UWM dashboards)
  # ---------------------------------------------------------------------------
  - catalog: registry.redhat.io/redhat/community-operator-index:v4.19
    packages:
    - name: grafana-operator
      channels:
      - name: v5

  additionalImages:  [] ## We will get this in phase 2. 
